conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'white',
    default_outline_color = 'white',
    default_shade_color = 'white',
    double_buffer = true,
    draw_borders = true,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'DejaVu Sans Mono:size=10',
    gap_x = 5,
    gap_y = 5,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_x = false,
    out_to_wayland = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'desktop',
    own_window_transparent = true,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
}

conky.text = [[
${color grey}Distro:$color $distribution
${color grey}Kernel:$color $kernel
${color grey}Uptime:$color $uptime
$hr
${color grey}CPU Freq.:$color $freq MHz
${color grey}CPU Usage:$color $cpu%
${color grey}CPUGovnor:$color $cpugovernor
${color grey}CPU Temp.:$color ${acpitemp} C
${color grey}Fan Speed:$color $ibm_fan RPM
$hr
${color grey}RAM Usage:$color $mem/$memmax - $memperc% ${membar 4}
${color grey}SWP Usage:$color $swap/$swapmax - $swapperc% ${swapbar 4}
${color grey}CachedMem:$color $cached
$hr
${color grey}Battery I:$color ${battery_percent BAT0}% ${battery_status BAT0} ${battery_time BAT0}
${color grey}        E:$color ${battery_percent BAT1}% ${battery_status BAT1} ${battery_time BAT1}
$hr
${color grey}RootFS(/):$color ${fs_used /}/${fs_size /} - ${fs_used_perc}%
${color grey} R: $color${diskio_read /dev/sda1}
${color grey} W: $color${diskio_write /dev/sda1}
$hr
${color grey}Networking
enp0s25:
 IP:$color ${addr enp0s25}${color grey}
 Up:$color ${upspeed enp0s25} ${color grey} - Down:$color ${downspeed enp0s25}${color grey}
wlp3s0:$color ${wireless_essid wlp3s0}${color grey}
 IP:$color ${addr wlp3s0}${color grey}
 Up:$color ${upspeed wlp3s0} ${color grey} - Down:$color ${downspeed wlp3s0}
$hr
${color grey}Processes:$color $processes  ${color grey}Running:$color $running_processes
${color grey}Name              PID     CPU%   MEM%
${color lightgrey} ${top name 1} ${top pid 1} ${top cpu 1} ${top mem 1}
${color lightgrey} ${top name 2} ${top pid 2} ${top cpu 2} ${top mem 2}
${color lightgrey} ${top name 3} ${top pid 3} ${top cpu 3} ${top mem 3}
${color lightgrey} ${top name 4} ${top pid 4} ${top cpu 4} ${top mem 4}
${color lightgrey} ${top name 5} ${top pid 5} ${top cpu 5} ${top mem 5}
]]
